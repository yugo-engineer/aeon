# Aeon configuration
#
# Enable skills by setting enabled: true. Multiple skills at the same time run in parallel.

skills:
  # --- Morning block (7 AM UTC) ---
  morning-brief:
    enabled: false
    schedule: "0 7 * * *"
  rss-digest:
    enabled: false
    schedule: "0 7 * * *"
  hacker-news-digest:
    enabled: false
    schedule: "0 7 * * *"
  paper-digest:
    enabled: false
    schedule: "0 7 * * *"
  tweet-digest:
    enabled: false
    schedule: "0 7 * * *"

  # --- Mid-morning (9 AM UTC) ---
  issue-triage:
    enabled: false
    schedule: "0 9 * * *"
  pr-review:
    enabled: false
    schedule: "0 9 * * *"
  github-monitor:
    enabled: false
    schedule: "0 9 * * *"

  # --- Midday (12 PM UTC) ---
  token-alert:
    enabled: false
    schedule: "0 12 * * *"
  wallet-digest:
    enabled: false
    schedule: "0 12 * * *"
  on-chain-monitor:
    enabled: false
    schedule: "0 12 * * *"
  defi-monitor:
    enabled: false
    schedule: "0 12 * * *"

  # --- Afternoon (2 PM UTC) ---
  article:
    enabled: false
    schedule: "0 14 * * *"
  digest:
    enabled: false
    schedule: "0 14 * * *"

  # --- Late afternoon (4 PM UTC) ---
  code-health:
    enabled: false
    schedule: "0 16 * * *"
  changelog:
    enabled: false
    schedule: "0 16 * * *"
  feature:
    enabled: false
    schedule: "0 16 * * *"
  build-skill:
    enabled: false
    schedule: "0 16 * * *"

  # --- Evening / meta (6 PM UTC) ---
  goal-tracker:
    enabled: false
    schedule: "0 18 * * *"
  skill-health:
    enabled: false
    schedule: "0 18 * * *"
  self-review:
    enabled: false
    schedule: "0 18 * * *"
  reflect:
    enabled: false
    schedule: "0 18 * * *"
  memory-flush:
    enabled: false
    schedule: "0 18 * * *"

  # --- Weekly (Monday only) ---
  weekly-review:
    enabled: false
    schedule: "0 19 * * 1"

  # --- Fallback (must be last) ---
  heartbeat:
    enabled: true
    schedule: "0 12 * * *"

# Default model for all skills. Override per-run via workflow_dispatch.
# Options: claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5-20251001
model: claude-opus-4-6

# Messaging integration
# Polls for messages every 5 minutes on Telegram/Discord/Slack.
telegram:
  enabled: true
