name: Aeon

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill'
        required: true
        type: choice
        options:
          - article
          - build-skill
          - changelog
          - code-health
          - defi-monitor
          - digest
          - feature
          - fetch-tweets
          - github-monitor
          - goal-tracker
          - hacker-news-digest
          - heartbeat
          - idea-capture
          - issue-triage
          - memory-flush
          - morning-brief
          - on-chain-monitor
          - paper-digest
          - pr-review
          - reddit-digest
          - reflect
          - research-brief
          - rss-digest
          - search-papers
          - search-skill
          - self-review
          - skill-health
          - token-alert
          - tweet-digest
          - wallet-digest
          - weekly-review
      model:
        description: 'Model'
        required: false
        type: choice
        default: '(config default)'
        options:
          - '(config default)'
          - claude-opus-4-6
          - claude-sonnet-4-6
          - claude-haiku-4-5-20251001
      vars:
        description: 'Variables (e.g. topic=rust, query=solana NFT)'
        required: false
        type: string
  workflow_call:
    inputs:
      skill:
        description: 'Skill to run'
        required: true
        type: string
      model:
        description: 'Model override'
        required: false
        type: string
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: aeon-${{ inputs.skill || github.event.action || github.run_id }}
  cancel-in-progress: false

jobs:
  run:
    if: github.event_name != 'issues' || github.event.label.name == 'ai-build'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Early checkout
        if: github.event_name == 'issues'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine skill
        id: skill
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "name=${{ inputs.skill }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            echo "name=feature" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if there's work
        id: work
        run: |
          if [ -n "${{ steps.skill.outputs.name }}" ]; then
            echo "mode=skill" >> "$GITHUB_OUTPUT"
            echo "label=${{ steps.skill.outputs.name }}" >> "$GITHUB_OUTPUT"
          else
            echo "Nothing to do"
          fi

      - name: Checkout repo
        if: steps.work.outputs.mode != ''
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.work.outputs.mode != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.work.outputs.mode != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Run
        if: steps.work.outputs.mode != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          CONFIG_MODEL=$(grep -E '^model:' aeon.yml | sed 's/^model: *//' | tr -d ' ')
          INPUT_MODEL="${{ inputs.model }}"
          if [ -n "$INPUT_MODEL" ] && [ "$INPUT_MODEL" != "(config default)" ]; then
            MODEL="$INPUT_MODEL"
          else
            MODEL="${CONFIG_MODEL:-claude-opus-4-6}"
          fi
          # Generate notify script in workspace (Claude calls: ./notify "message")
          cat > ./notify << 'NOTIFY_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          MSG="$1"
          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg chat "$TELEGRAM_CHAT_ID" --arg text "$MSG" '{chat_id: $chat, text: $text, parse_mode: "Markdown"}')" > /dev/null || true
          fi
          if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$MSG" '{content: $text}')" > /dev/null || true
          fi
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -sf -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$MSG" '{text: $text}')" > /dev/null || true
          fi
          NOTIFY_SCRIPT
          chmod +x ./notify

          ALLOWED="Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
          ALLOWED="$ALLOWED,Bash(curl:*),Bash(gh:*),Bash(git:*),Bash(jq:*)"
          ALLOWED="$ALLOWED,Bash(./notify:*)"
          ALLOWED="$ALLOWED,Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(chmod:*)"
          ALLOWED="$ALLOWED,Bash(date:*),Bash(echo:*),Bash(node:*),Bash(npm:*),Bash(npx:*)"
          ALLOWED="$ALLOWED,Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(grep:*)"

          SKILL_NAME="${{ steps.skill.outputs.name }}"
          VARS="${{ inputs.vars }}"
          PROMPT="Today is $TODAY. Read and execute the skill defined in skills/${SKILL_NAME}/SKILL.md"
          if [ -n "$VARS" ]; then
            PROMPT="$PROMPT

          Use these variables (override any defaults in the skill file):
          $VARS"
          fi
          claude -p "$PROMPT" \
            --model "$MODEL" --allowedTools "$ALLOWED"

      - name: Commit results
        if: steps.work.outputs.mode != ''
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          rm -f ./notify  # Remove generated script before committing

          CURRENT_BRANCH=$(git branch --show-current)
          LABEL="${{ steps.work.outputs.label }}"

          # If Claude created a feature branch, push it then switch back to main
          if [ "$CURRENT_BRANCH" != "main" ] && [ -n "$CURRENT_BRANCH" ]; then
            echo "On feature branch: $CURRENT_BRANCH"
            git add -A
            git diff --staged --quiet || git commit -m "chore($LABEL): auto-commit $(date +%Y-%m-%d)"
            git push --force-with-lease -u origin "$CURRENT_BRANCH" || true

            # Switch back to main and cherry-pick memory/log changes if any
            git checkout main
            git pull --rebase origin main || true
          fi

          # Commit any remaining changes on main
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "chore($LABEL): auto-commit $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              git push -u origin HEAD && exit 0
            else
              echo "Rebase conflict on attempt $i, auto-resolving..."
              # Auto-resolve conflicts in append-only files (logs, memory)
              for f in $(git diff --name-only --diff-filter=U); do
                if [[ "$f" == memory/logs/* ]] || [[ "$f" == memory/topics/* ]] || [[ "$f" == memory/MEMORY.md ]]; then
                  # Accept both sides for append-only files
                  sed -i '/^<<<<<<< /d; /^=======/d; /^>>>>>>> /d' "$f"
                  git add "$f"
                else
                  # For other files, accept theirs and re-apply our changes next run
                  git checkout --theirs "$f"
                  git add "$f"
                fi
              done
              if git diff --cached --quiet; then
                git rebase --skip
              else
                GIT_EDITOR=true git rebase --continue
              fi
            fi
            echo "Push attempt $i failed, retrying..."
          done
          echo "Failed to push after 3 attempts"
          exit 1
