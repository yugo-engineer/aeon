name: Test Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'aeon.yml'
      - '.github/workflows/test-skills.yml'
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'aeon.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke-test:
    name: Skill smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Make smoke script executable
        run: chmod +x skills/skill-health/tests/smoke.sh

      - name: Run smoke tests
        id: smoke
        run: |
          # Capture output and exit code separately so we can post it to PR
          set +e
          OUTPUT=$(./skills/skill-health/tests/smoke.sh 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          # Store output for PR comment (strip ANSI codes)
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          {
            echo 'smoke_output<<EOF'
            echo "$CLEAN"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Post results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const exitCode = '${{ steps.smoke.outputs.exit_code }}';
            const output = `${{ steps.smoke.outputs.smoke_output }}`;
            const passed = exitCode === '0';
            const icon = passed ? '✅' : '❌';
            const title = passed ? 'Skill smoke tests passed' : 'Skill smoke tests failed';

            const body = [
              `## ${icon} ${title}`,
              '',
              '```',
              output.slice(0, 6000),
              '```',
              '',
              passed
                ? '_All SKILL.md files validated — frontmatter, body, cron expressions, and placeholder checks passed._'
                : '_Fix the errors above before merging. Run `./skills/skill-health/tests/smoke.sh` locally to reproduce._',
            ].join('\n');

            // Find and update existing comment if present
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Skill smoke tests')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Dry-run canary skills
        if: always()
        run: |
          echo "Running dry-run structural checks on canary skills..."
          ./skills/skill-health/tests/smoke.sh --dry-run 2>&1 | tail -30 || true
