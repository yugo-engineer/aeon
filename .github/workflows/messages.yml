name: Messages

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [telegram-message, discord-message, slack-message]

permissions:
  contents: write
  pull-requests: write
  issues: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: aeon-messages
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.messages.outputs.matrix }}

    steps:
      - name: Check messages
        id: messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          MESSAGES='[]'

          # --- Webhook trigger (repository_dispatch) ---
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MESSAGE=$(echo '${{ toJson(github.event.client_payload.message) }}' | jq -r '.')
            if [ -n "$MESSAGE" ] && [ "$MESSAGE" != "null" ]; then
              TYPE="${{ github.event.action }}"
              SOURCE="webhook"
              case "$TYPE" in
                telegram-message) SOURCE="telegram" ;;
                discord-message) SOURCE="discord" ;;
                slack-message) SOURCE="slack" ;;
              esac
              MESSAGES=$(echo "$MESSAGES" | jq -c --arg s "$SOURCE" --arg m "$MESSAGE" '. + [{source: $s, message: $m}]')
            fi
          else
            # --- Telegram (poll with offset-based ack) ---
            if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
              RESPONSE=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?timeout=0&allowed_updates=%5B%22message%22%5D")
              COUNT=$(echo "$RESPONSE" | jq -r '.result | length')
              LAST_UPDATE_ID=""

              if [ "$COUNT" -gt 0 ] 2>/dev/null; then
                for i in $(seq 0 $((COUNT - 1))); do
                  MSG=$(echo "$RESPONSE" | jq -r ".result[$i].message.text // empty")
                  CHAT_ID=$(echo "$RESPONSE" | jq -r ".result[$i].message.chat.id // empty")
                  LAST_UPDATE_ID=$(echo "$RESPONSE" | jq -r ".result[$i].update_id // empty")

                  if [ -z "$MSG" ]; then continue; fi
                  if [ "$CHAT_ID" != "$TELEGRAM_CHAT_ID" ]; then
                    echo "Telegram: ignoring message from unauthorized chat"
                    continue
                  fi
                  echo "Telegram: $MSG"
                  MESSAGES=$(echo "$MESSAGES" | jq -c --arg m "$MSG" '. + [{source: "telegram", message: $m}]')
                done

                # Acknowledge all updates at once
                if [ -n "$LAST_UPDATE_ID" ]; then
                  curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=$((LAST_UPDATE_ID + 1))" > /dev/null
                fi
              fi
            fi

            # --- Discord (poll channel, reaction-based ack) ---
            if [ -n "${DISCORD_BOT_TOKEN:-}" ] && [ -n "${DISCORD_CHANNEL_ID:-}" ]; then
              RESPONSE=$(curl -s -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
                "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages?limit=10")
              COUNT=$(echo "$RESPONSE" | jq -r 'if type == "array" then length else 0 end')

              if [ "$COUNT" -gt 0 ] 2>/dev/null; then
                # Discord returns newest first — reverse to get chronological order
                for i in $(seq $((COUNT - 1)) -1 0); do
                  MSG_CONTENT=$(echo "$RESPONSE" | jq -r ".[$i].content // empty")
                  MSG_ID=$(echo "$RESPONSE" | jq -r ".[$i].id // empty")
                  MSG_AUTHOR_BOT=$(echo "$RESPONSE" | jq -r ".[$i].author.bot // false")
                  HAS_REACTION=$(echo "$RESPONSE" | jq -r ".[$i].reactions[]? | select(.emoji.name == \"✅\") | .me // false")

                  if [ -z "$MSG_CONTENT" ] || [ "$MSG_AUTHOR_BOT" = "true" ] || [ "$HAS_REACTION" = "true" ]; then
                    continue
                  fi
                  # Mark as processed
                  curl -s -X PUT -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
                    "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages/$MSG_ID/reactions/%E2%9C%85/@me" > /dev/null
                  echo "Discord: $MSG_CONTENT"
                  MESSAGES=$(echo "$MESSAGES" | jq -c --arg m "$MSG_CONTENT" '. + [{source: "discord", message: $m}]')
                done
              fi
            fi

            # --- Slack (poll channel, reaction-based ack) ---
            if [ -n "${SLACK_BOT_TOKEN:-}" ] && [ -n "${SLACK_CHANNEL_ID:-}" ]; then
              RESPONSE=$(curl -s -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                "https://slack.com/api/conversations.history?channel=$SLACK_CHANNEL_ID&limit=10")
              COUNT=$(echo "$RESPONSE" | jq -r '.messages | length')

              if [ "$COUNT" -gt 0 ] 2>/dev/null; then
                # Slack returns newest first — reverse to get chronological order
                for i in $(seq $((COUNT - 1)) -1 0); do
                  MSG_TEXT=$(echo "$RESPONSE" | jq -r ".messages[$i].text // empty")
                  MSG_TS=$(echo "$RESPONSE" | jq -r ".messages[$i].ts // empty")
                  MSG_BOT_ID=$(echo "$RESPONSE" | jq -r ".messages[$i].bot_id // empty")
                  HAS_REACTION=$(echo "$RESPONSE" | jq -r ".messages[$i].reactions[]? | select(.name == \"white_check_mark\") | .name // empty")

                  if [ -z "$MSG_TEXT" ] || [ "$MSG_BOT_ID" != "null" ] || [ -n "$HAS_REACTION" ]; then
                    continue
                  fi
                  # Mark as processed
                  curl -s -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg ts "$MSG_TS" \
                      '{channel: $ch, timestamp: $ts, name: "white_check_mark"}')" \
                    "https://slack.com/api/reactions.add" > /dev/null
                  echo "Slack: $MSG_TEXT"
                  MESSAGES=$(echo "$MESSAGES" | jq -c --arg m "$MSG_TEXT" '. + [{source: "slack", message: $m}]')
                done
              fi
            fi
          fi

          COUNT=$(echo "$MESSAGES" | jq -r 'length')
          if [ "$COUNT" -eq 0 ]; then
            echo "No new messages"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            echo "Found $COUNT message(s)"
            # Build matrix: each message gets an index so the respond job can extract it
            MATRIX=$(echo "$MESSAGES" | jq -c '{include: [range(length) as $i | {index: $i, source: .[$i].source}]}')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            # Store full messages array as an artifact via file
            echo "$MESSAGES" > /tmp/messages.json
          fi

      - name: Upload messages
        if: fromJson(steps.messages.outputs.matrix).include[0] != null
        uses: actions/upload-artifact@v4
        with:
          name: messages
          path: /tmp/messages.json
          retention-days: 1

  respond:
    needs: poll
    if: fromJson(needs.poll.outputs.matrix).include[0] != null
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJson(needs.poll.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download messages
        uses: actions/download-artifact@v4
        with:
          name: messages

      - name: Extract message
        id: msg
        run: |
          SOURCE=$(jq -r '.[${{ matrix.index }}].source' messages.json)
          MESSAGE=$(jq -r '.[${{ matrix.index }}].message' messages.json)
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "message<<ENDOFMESSAGE" >> "$GITHUB_OUTPUT"
          echo "$MESSAGE" >> "$GITHUB_OUTPUT"
          echo "ENDOFMESSAGE" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          CONFIG_MODEL=$(grep -E '^model:' aeon.yml | sed 's/^model: *//' | tr -d ' ')
          MODEL="${CONFIG_MODEL:-claude-opus-4-6}"

          cat > ./notify << 'NOTIFY_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          MSG="$1"
          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg chat "$TELEGRAM_CHAT_ID" --arg text "$MSG" '{chat_id: $chat, text: $text, parse_mode: "Markdown"}')" > /dev/null || true
          fi
          if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$MSG" '{content: $text}')" > /dev/null || true
          fi
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -sf -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$MSG" '{text: $text}')" > /dev/null || true
          fi
          NOTIFY_SCRIPT
          chmod +x ./notify

          ALLOWED="Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
          ALLOWED="$ALLOWED,Bash(curl:*),Bash(gh:*),Bash(git:*),Bash(jq:*)"
          ALLOWED="$ALLOWED,Bash(./notify:*)"
          ALLOWED="$ALLOWED,Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(chmod:*)"
          ALLOWED="$ALLOWED,Bash(date:*),Bash(echo:*),Bash(node:*),Bash(npm:*),Bash(npx:*)"
          ALLOWED="$ALLOWED,Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(grep:*)"

          SOURCE="${{ steps.msg.outputs.source }}"
          MESSAGE="${{ steps.msg.outputs.message }}"
          claude -p "Today is $TODAY. You received this message from the user on ${SOURCE}:

          \"$MESSAGE\"

          Read memory/MEMORY.md for context. Look at the available skills in skills/ to understand what you can do.

          Interpret what the user wants and act on it:
          - If they want you to run a skill (e.g. \"write an article about X\", \"send me a digest\"), read that skill file and execute it.
          - If they want information or have a question, research it and respond.
          - If they want you to remember something, update memory/MEMORY.md.
          - For anything else, do your best and explain what you did.

          Always send your response back via ./notify so the user sees it." \
            --model "$MODEL" --allowedTools "$ALLOWED"

      - name: Commit results
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          rm -f ./notify messages.json
          git add -A
          git diff --staged --quiet && exit 0
          SOURCE="${{ steps.msg.outputs.source }}"
          git commit -m "chore($SOURCE): auto-commit $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              git push -u origin HEAD && exit 0
            else
              echo "Rebase conflict on attempt $i, auto-resolving..."
              for f in $(git diff --name-only --diff-filter=U); do
                if [[ "$f" == memory/logs/* ]] || [[ "$f" == memory/topics/* ]] || [[ "$f" == memory/MEMORY.md ]]; then
                  sed -i '/^<<<<<<< /d; /^=======/d; /^>>>>>>> /d' "$f"
                  git add "$f"
                else
                  git checkout --theirs "$f"
                  git add "$f"
                fi
              done
              if git diff --cached --quiet; then
                git rebase --skip
              else
                GIT_EDITOR=true git rebase --continue
              fi
            fi
            echo "Push attempt $i failed, retrying..."
          done
          echo "Failed to push after 3 attempts"
          exit 1

  schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine scheduled skills
        id: skill
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MINUTE=$(date -u +%-M)
          HOUR=$(date -u +%-H)
          DOM=$(date -u +%-d)
          MONTH=$(date -u +%-m)
          DOW=$(date -u +%w)

          cron_match() {
            local field="$1" value="$2"
            [ "$field" = "*" ] && return 0
            if [[ "$field" == */* ]]; then
              local interval="${field#*/}"
              [ $((value % interval)) -eq 0 ] && return 0
              return 1
            fi
            IFS=',' read -ra VALS <<< "$field"
            for v in "${VALS[@]}"; do
              [ "$v" = "$value" ] && return 0
            done
            return 1
          }

          declare -A SKILL_ENABLED SKILL_SCHEDULE
          SKILL_ORDER=()
          CURRENT_SKILL=""
          while IFS= read -r line; do
            if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+):\ *$ ]]; then
              CURRENT_SKILL="${BASH_REMATCH[1]}"
              SKILL_ORDER+=("$CURRENT_SKILL")
              SKILL_ENABLED["$CURRENT_SKILL"]="true"
              SKILL_SCHEDULE["$CURRENT_SKILL"]=""
            fi
            if [[ "$line" =~ ^\ \ \ \ enabled:\ *false ]] && [ -n "$CURRENT_SKILL" ]; then
              SKILL_ENABLED["$CURRENT_SKILL"]="false"
            fi
            if [[ "$line" =~ ^\ \ \ \ schedule:\ *\"([^\"]+)\" ]] && [ -n "$CURRENT_SKILL" ]; then
              SKILL_SCHEDULE["$CURRENT_SKILL"]="${BASH_REMATCH[1]}"
            fi
          done < aeon.yml

          MATCHED=()
          for SKILL in "${SKILL_ORDER[@]}"; do
            [ "${SKILL_ENABLED[$SKILL]}" = "false" ] && continue
            SCHED="${SKILL_SCHEDULE[$SKILL]}"
            [ -z "$SCHED" ] && continue

            IFS=' ' read -r C_MIN C_HOUR C_DOM C_MONTH C_DOW <<< "$SCHED"
            cron_match "$C_MIN" "$MINUTE" || continue
            cron_match "$C_HOUR" "$HOUR" || continue
            cron_match "$C_DOM" "$DOM" || continue
            cron_match "$C_MONTH" "$MONTH" || continue
            cron_match "$C_DOW" "$DOW" || continue
            MATCHED+=("$SKILL")
            echo "Matched skill: $SKILL"
          done

          # Dispatch all matched skills via the Aeon workflow
          for SKILL in "${MATCHED[@]}"; do
            echo "Dispatching: $SKILL"
            gh workflow run aeon.yml -f skill="$SKILL"
          done
