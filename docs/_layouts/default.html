<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <style>
    /* Reset and base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      line-height: 1.7;
      color: #1a1a2e;
      background: #f8f9fa;
    }

    /* Header */
    header {
      background: #1a1a2e;
      color: #e2e8f0;
      padding: 0 2rem;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .site-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e2e8f0;
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .site-title span { color: #7c83fd; }
    nav a {
      color: #a0aec0;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    nav a:hover { color: #e2e8f0; }

    /* Main content */
    main {
      max-width: 900px;
      margin: 2.5rem auto;
      padding: 0 2rem;
    }

    /* Article / post content */
    .post-header { margin-bottom: 2rem; }
    .post-title {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.2;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }
    .post-meta {
      color: #718096;
      font-size: 0.875rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .post-meta .category {
      background: #eef2ff;
      color: #4f46e5;
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .post-content {
      font-size: 1.0625rem;
    }
    .post-content h1,
    .post-content h2,
    .post-content h3,
    .post-content h4 {
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: #1a1a2e;
      font-weight: 700;
    }
    .post-content h2 { font-size: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.3rem; }
    .post-content h3 { font-size: 1.2rem; }
    .post-content p { margin-bottom: 1.1rem; }
    .post-content a { color: #4f46e5; text-decoration: underline; }
    .post-content a:hover { color: #3730a3; }
    .post-content ul, .post-content ol { padding-left: 1.5rem; margin-bottom: 1.1rem; }
    .post-content li { margin-bottom: 0.3rem; }
    .post-content code {
      background: #f0f0f7;
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.875em;
    }
    .post-content pre {
      background: #1e1e3f;
      color: #e0e0ff;
      padding: 1.25rem;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }
    .post-content pre code {
      background: none;
      padding: 0;
      font-size: 0.875rem;
      color: inherit;
    }
    .post-content blockquote {
      border-left: 4px solid #7c83fd;
      padding: 0.5rem 1rem;
      color: #4a5568;
      background: #f7f7ff;
      margin-bottom: 1.1rem;
      border-radius: 0 6px 6px 0;
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .post-content th, .post-content td {
      border: 1px solid #e2e8f0;
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    .post-content th { background: #f0f0f7; font-weight: 700; }

    /* Cards / list */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 1.25rem;
      transition: box-shadow 0.15s, border-color 0.15s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(79,70,229,0.1);
      border-color: #7c83fd;
    }
    .card-category {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4f46e5;
      margin-bottom: 0.4rem;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #1a1a2e;
    }
    .card-date { font-size: 0.8rem; color: #a0aec0; margin-bottom: 0.5rem; }
    .card-excerpt { font-size: 0.875rem; color: #4a5568; line-height: 1.5; }

    /* Section headers */
    .section-header {
      font-size: 1.3rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-header::after {
      content: "";
      flex: 1;
      height: 2px;
      background: #e2e8f0;
      border-radius: 2px;
    }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: #e2e8f0;
      border-radius: 14px;
      padding: 3rem 2.5rem;
      margin-bottom: 2.5rem;
    }
    .hero h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 0.75rem; color: #fff; }
    .hero h1 span { color: #7c83fd; }
    .hero p { font-size: 1.05rem; color: #a0aec0; max-width: 600px; margin-bottom: 1.25rem; }
    .hero-links { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #7c83fd; color: #fff; }
    .btn-outline { border: 1.5px solid #4a5568; color: #a0aec0; }

    /* Footer */
    footer {
      border-top: 1px solid #e2e8f0;
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.85rem;
      color: #a0aec0;
    }
    footer a { color: #4f46e5; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 640px) {
      .header-inner { flex-direction: column; height: auto; padding: 1rem 0; gap: 0.5rem; }
      nav a { margin-left: 0.75rem; }
      .hero { padding: 2rem 1.5rem; }
      .hero h1 { font-size: 1.6rem; }
      main { padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">AEON <span>Gallery</span></a>
      <nav>
        <a href="{{ '/articles' | relative_url }}">Articles</a>
        <a href="{{ '/skills' | relative_url }}">Skills</a>
        <a href="https://github.com/aaronjmars/aeon" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>
      Generated by <a href="https://github.com/aaronjmars/aeon" target="_blank" rel="noopener">Aeon</a> — autonomous AI agent on GitHub Actions, powered by Claude Code.
    </p>
  </footer>
</body>
</html>
