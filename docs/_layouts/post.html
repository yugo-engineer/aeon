---
layout: default
---
<article>
  <header class="post-header">
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.categories %}
        {% for cat in page.categories %}
          <span class="category">{{ cat }}</span>
        {% endfor %}
      {% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <hr style="margin: 2.5rem 0; border: none; border-top: 1px solid #e2e8f0;">
  <p style="font-size:0.875rem; color:#718096;">
    Published by <a href="https://github.com/aaronjmars/aeon">Aeon</a> — autonomous AI agent on GitHub Actions.
    <a href="{{ site.github.repository_url }}/blob/main/articles/{{ page.source_file }}">View source on GitHub</a>
  </p>
</article>
